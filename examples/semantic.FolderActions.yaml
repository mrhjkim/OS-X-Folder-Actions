# ------------------------------------------------------------------
# 샘플: SemanticRules — 무료 로컬 벡터 유사도로 문서 분류
# ------------------------------------------------------------------
# 이 파일을 감시할 폴더에 .FolderActions.yaml 로 복사하세요.
#
# 동작: 파일 내용(또는 파일명)을 로컬 임베딩 모델(fastembed, ONNX, API 키 없음)로
#       벡터화하고, 카테고리별 예시 문구(Utterances)와 코사인 유사도를 계산해
#       가장 가까운 카테고리로 이동합니다. 유료 AI 토큰을 쓰지 않습니다.
#
# 파이프라인: 파일명 규칙(Rules) → SemanticRules(무료 벡터) → AiRules(유료 LLM 폴백)
#       확신도가 SimilarityThreshold 미만이면 AiRules로 넘어갑니다.
#
# 첫 분류 시 임베딩 모델(~240MB)이 ~/.cache/folder-actions/fastembed 로 한 번 받아집니다.
#
# EmbedSource — 실측(2026-07-15)으로 확인한 사용 지침:
#   content  : 내용으로 분류. 내용이 서로 다른 카테고리에 강함 (청구서 vs 계약서 vs 이력서).
#   filename : 파일명으로 분류. 문서 종류가 파일명에 있을 때 ("주간보고", "설계문서").
#              같은 프로젝트의 다른 형식 문서를 구분할 때 씁니다.
#   both     : 파일명 + 내용. 남용 금지 — 내용이 파일명 신호를 희석할 수 있음.
#   (주의) content 점수와 filename 점수는 분포가 달라 한 블록에 섞으면 편향될 수 있습니다.
#          한 폴더는 되도록 한 EmbedSource로 통일하세요.
# ------------------------------------------------------------------

# 파일명으로 확실히 잡히는 건 여기(무료·정확). AI 없이 처리됩니다.
Rules: []

SemanticRules:
  Model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"  # 다국어, 대칭형, 프리픽스 불필요
  SimilarityThreshold: 0.5           # 미만이면 AiRules로 폴백. 실제 로그 보고 튜닝하세요.
  EmbedSource: content               # 블록 기본값: content | filename | both

  Rules:
    # 내용이 뚜렷이 다른 카테고리 → content 로 분류 (벡터가 가장 빛나는 자리)
    - Title: "청구서"
      Utterances:
        - "세금계산서 공급가액 부가세 청구 금액"
        - "인보이스 결제 요청 대금 청구"
        - "영수증 결제 내역 카드 승인"
      Actions:
        - MoveToFolder: "~/Documents/Invoices"

    - Title: "계약서"
      Utterances:
        - "계약 당사자 갑 을 서명 날인 조항"
        - "비밀유지 NDA 위반 손해 배상"
      Actions:
        - MoveToFolder: "~/Documents/Contracts"

    # 같은 주제·다른 형식 → filename 으로 (문서 종류가 파일명에 있음)
    # (파일명에 "주간업무" 처럼 정확한 키워드가 항상 들어간다면 위의 Rules 의
    #  FileNameContains 가 더 정확하고 무료입니다. filename 임베딩은 키워드가
    #  변형될 때 — "주간보고" vs "주간업무보고" vs "위클리" — 값을 합니다.)
    - Title: "설계문서"
      EmbedSource: filename          # 규칙별 override
      Utterances:
        - "설계문서 상세 설계 아키텍처"
        - "리빌딩 설계 구조"
      Actions:
        - MoveToFolder: "~/Documents/Design"
