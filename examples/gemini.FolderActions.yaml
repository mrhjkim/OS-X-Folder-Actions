# ------------------------------------------------------------------
# 샘플: Gemini API 백엔드로 AI 분류 사용하기
# ------------------------------------------------------------------
# 사용법:
#   1) 이 파일을 감시할 폴더에 .FolderActions.yaml 이라는 이름으로 복사합니다.
#        cp examples/gemini.FolderActions.yaml ~/Downloads/.FolderActions.yaml
#   2) 아래 "키 파일 준비"를 한 번 실행해 API 키를 파일로 저장합니다.
#   3) 규칙(Rules)의 Title / Description / MoveToFolder 를 실제 용도에 맞게 고칩니다.
#
# ⚠️  Provider: gemini 는 파일 내용을 맥 밖으로 보냅니다.
#     분류되는 모든 파일(PDF·docx·xlsx·txt)의 본문 앞 4096자가 구글 API로 전송됩니다.
#     민감한 폴더(급여명세서·계약서 등)라면 Provider 줄을 지워 로컬 Ollama로 쓰세요.
#
# 키 파일 준비 (한 번만):
#     mkdir -p ~/.config/folder-actions
#     printf '%s' 'YOUR_GEMINI_API_KEY' > ~/.config/folder-actions/gemini.key
#     chmod 600 ~/.config/folder-actions/gemini.key
#
# 키 조회 순서: 환경변수 GEMINI_API_KEY 우선, 없으면 아래 ApiKeyFile.
#   macOS Folder Actions 는 환경이 거의 없는 GUI 데몬으로 실행되므로,
#   실제 파일 드롭에서 동작하게 만드는 건 ApiKeyFile 입니다. (환경변수만 두면
#   터미널 테스트는 통과하지만 정작 파일을 떨어뜨릴 때 조용히 실패합니다.)
# ------------------------------------------------------------------

# Stage 1: 일반 규칙 (파일명·확장자 기반, 정확 매칭). AI보다 먼저 평가됩니다.
# AI 호출 없이 처리할 수 있는 건 여기에 두는 게 빠르고 무료입니다.
Rules:
  - Title: "주간보고로 이동"
    Criteria:
      - AllCriteria:
        - FileExtension: "xlsx"
        - FileNameContains: "주간업무"
    Actions:
      - MoveToFolder: "~/Documents/주간보고"

# Stage 2: AI 규칙 — 위 규칙에 안 맞는 파일을 내용으로 분류.
AiRules:
  Provider: gemini                                   # 생략하면 ollama(로컬, 기본값)
  Model: gemini-3.5-flash                            # 최신 모델 ID는 ai.google.dev 확인
  ApiKeyFile: ~/.config/folder-actions/gemini.key
  ConfidenceThreshold: 0.8                           # 이 확신도 미만이면 이동하지 않음
  TimeoutSeconds: 60                                 # 기본 60초. thinking 모델이 느리면 90~120으로.
  Rules:
    - Title: "청구서"
      Description: "인보이스, 영수증, 결제 내역, 세금계산서"
      Actions:
        - MoveToFolder: "~/Documents/Invoices"

    - Title: "계약서"
      Description: "계약서, NDA, 오퍼레터, 약정서"
      Actions:
        - MoveToFolder: "~/Documents/Contracts"

# 감사 로그(기본 활성화). 비활성화하려면: Audit: {Enabled: false}
